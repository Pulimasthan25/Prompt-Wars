steps:
  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/crisis-lens:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/crisis-lens:latest'
      - '.'
    id: 'build-image'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/crisis-lens'
    id: 'push-image'
    waitFor: ['build-image']

  # Deploy to Cloud Run with security best practices
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'crisis-lens'
      - '--image=gcr.io/$PROJECT_ID/crisis-lens:$SHORT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--no-allow-unauthenticated-or-failing'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=600'
      - '--concurrency=80'
      - '--max-instances=100'
      - '--min-instances=0'
    id: 'deploy'
    waitFor: ['push-image']

# Build configuration
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'N1_HIGHCPU_8'

# Timeout for entire build
timeout: '1800s'

# Substitution variables
substitutions:
  _REGION: 'europe-west1'
  _SERVICE_NAME: 'crisis-lens'

