steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/crisis-lens', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/crisis-lens']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'crisis-lens'
      - '--image=gcr.io/$PROJECT_ID/crisis-lens'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-secrets=GEMINI_API_KEY=GEMINI_API_KEY:latest'
      # Add GCS_EXPORT_BUCKET, GA4_MEASUREMENT_ID, GOOGLE_OAUTH_CLIENT_ID in Console if needed.
      - '--set-env-vars=USE_VERTEX_AI=true,ENABLE_FIRESTORE=true,VERTEX_LOCATION=us-central1'

options:
  logging: CLOUD_LOGGING_ONLY
